name: factory-scaffold

on:
  push:
    branches: [main]
  pull_request:

jobs:
  scaffold-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Check scaffold files
        run: python3 .codex/scripts/check_factory_scaffold.py
      - name: Check AGENTS hygiene
        run: python3 .codex/scripts/check_agents_hygiene.py
      - name: Check LOCAL-35 phase refactor source line delta
        if: ${{ github.event_name == 'pull_request' && (contains(join(github.event.pull_request.labels.*.name, ','), 'PR: Refactor') || contains(join(github.event.pull_request.labels.*.name, ','), 'refactor')) }}
        run: python3 .codex/scripts/check_refactor_line_delta.py --check-diff --baseline-file docs/architecture/refactor-baseline.md
      - name: Compile factory scripts
        run: python3 -m compileall .codex/scripts
      - name: Unit test gate validation logic
        run: python3 -m unittest discover -s .codex/scripts/tests -p "test_*.py"
      - name: Validate artifact contract (scaffold-safe)
        run: python3 .codex/scripts/validate_artifacts.py --allow-missing-run
